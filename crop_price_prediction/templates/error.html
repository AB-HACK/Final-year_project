{% extends "base.html" %}

{% block title %}Error | PredictAgro{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body text-center p-5">
        <div class="display-4 mb-3">⚠️</div>
        <h2 class="h3 mb-3">Something went wrong</h2>
        <p class="text-muted mb-4">{{ error_message }}</p>
        <a href="/" class="btn btn-naija">Try Again</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
